services:
  backend:
    build: ./backend
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-ibc_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ibc_password}
      DB_NAME: ${MYSQL_DATABASE:-ibc_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_COOKIE_TTL_MS: ${JWT_COOKIE_TTL_MS:-86400000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      EMAIL_VERIFICATION_TTL_MS: ${EMAIL_VERIFICATION_TTL_MS:-86400000}
      SMTP_HOST: ${SMTP_HOST:-smtp.mail.ovh.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Budgie}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      ETH_RPC_URL: ${ETH_RPC_URL:-http://anvil:8545}
      ETH_CHAIN_ID: ${ETH_CHAIN_ID:-31337}
      ETH_CHAIN_NAME: ${ETH_CHAIN_NAME:-Anvil Local}
      ETH_WALLET_ADDRESS: ${ETH_WALLET_ADDRESS:-0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266}
    depends_on:
      db:
        condition: service_healthy
      anvil:
        condition: service_started
    networks:
      - ibc-internal
      - ibc-public

  frontend:
    build: ./frontend
    environment:
      VITE_ETH_RPC_URL: ${VITE_ETH_RPC_URL:-http://localhost:8545}
      VITE_ETH_CHAIN_ID: ${VITE_ETH_CHAIN_ID:-31337}
      VITE_ETH_CHAIN_NAME: ${VITE_ETH_CHAIN_NAME:-Anvil Local}
    depends_on:
      - backend
      - anvil
    networks:
      - ibc-public
    expose:
      - "5173"

  db:
    image: mysql:8.4.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ibc_db}
      MYSQL_USER: ${MYSQL_USER:-ibc_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ibc_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      retries: 5
      timeout: 3s
    networks:
      - ibc-internal

  nginx:
    build: ./nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    networks:
      - ibc-public

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.3
    platform: linux/amd64
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    networks:
      - ibc-internal
      - ibc-public
    expose:
      - "80"

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint:
      - anvil
    environment:
      ANVIL_IP_ADDR: 0.0.0.0
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "31337"
    ports:
      - "8545:8545"
    networks:
      - ibc-public

networks:
  ibc-internal:
    driver: bridge
    internal: true
  ibc-public:
    driver: bridge

volumes:
  db_data:
